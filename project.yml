name: OLCVPN
options:
  bundleIdPrefix: com.you.olcvpn
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    # Поменяй на свой Team ID:
    DEVELOPER_TEAM: ABCDE12345
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    # Версия по семантике (MAJOR.MINOR.PATCH). Поднимаем на каждом изменении:
    #   PATCH — исправления багов, MINOR — новые фичи, MAJOR — крупные несовместимые изменения.
    MARKETING_VERSION: "1.0.0"
    # Номер сборки — целое число, растёт на каждый билд.
    CURRENT_PROJECT_VERSION: "1"

targets:
  OLCVPN:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.you.olcvpn
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/OLCVPN.entitlements
        DEVELOPMENT_TEAM: $(DEVELOPER_TEAM)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ядро olcRTC (Go) тянет системный резолвер — иначе линковка падает на res_9_*.
        OTHER_LDFLAGS:
          - -lresolv
    dependencies:
      - target: OLCTunnel
        embed: true
      # Ядро olcRTC нужно и приложению для проверки связи (MobilePing).
      - framework: Frameworks/Olcrtc.xcframework
        embed: true

  OLCTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: OLCTunnel
      - path: Shared
      - path: App/Model/Profile.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.you.olcvpn.OLCTunnel
        INFOPLIST_FILE: OLCTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: OLCTunnel/OLCTunnel.entitlements
        DEVELOPMENT_TEAM: $(DEVELOPER_TEAM)
        SWIFT_OBJC_BRIDGING_HEADER: OLCTunnel/OLCTunnel-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/hev/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/hev/lib
        OTHER_LDFLAGS:
          - -lhev-socks5-tunnel
          - -lresolv
    dependencies:
      # Собирается build.sh в Frameworks/ перед generate:
      - framework: Frameworks/Olcrtc.xcframework
        embed: true

  OLCVPNTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: App/Model
    dependencies:
      - target: OLCVPN
